services:

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: loteforte
      POSTGRES_USER: loteforte
      POSTGRES_PASSWORD: loteforte
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./seed_criterios.sql:/docker-entrypoint-initdb.d/02_seed_criterios.sql
      - ./seed_demo.sql:/docker-entrypoint-initdb.d/03_seed_demo.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U loteforte"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://loteforte:loteforte@db:5432/loteforte
      DATABASE_URL_SYNC: postgresql://loteforte:loteforte@db:5432/loteforte
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: troque-em-producao-com-openssl-rand-hex-32
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/docs || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
    build: ./backend
    command: celery -A app.workers.celery_app worker --loglevel=info
    volumes:
      - ./backend:/app
    environment:
      DATABASE_URL: postgresql+asyncpg://loteforte:loteforte@db:5432/loteforte
      DATABASE_URL_SYNC: postgresql://loteforte:loteforte@db:5432/loteforte
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: troque-em-producao-com-openssl-rand-hex-32
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  beat:
    build: ./backend
    command: celery -A app.workers.celery_app beat --loglevel=info
    volumes:
      - ./backend:/app
    environment:
      DATABASE_URL: postgresql+asyncpg://loteforte:loteforte@db:5432/loteforte
      DATABASE_URL_SYNC: postgresql://loteforte:loteforte@db:5432/loteforte
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: troque-em-producao-com-openssl-rand-hex-32
    depends_on:
      redis:
        condition: service_healthy

  web:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      api:
        condition: service_healthy

volumes:
  pgdata:
