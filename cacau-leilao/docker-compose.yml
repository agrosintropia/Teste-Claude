services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: loteforte
      POSTGRES_USER: loteforte
      POSTGRES_PASSWORD: loteforte
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./seed_criterios.sql:/docker-entrypoint-initdb.d/02_seed_criterios.sql

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      - db
      - redis

volumes:
  pgdata:
